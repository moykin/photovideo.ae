# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# Cache zones
proxy_cache_path /var/cache/nginx/strapi levels=1:2 keys_zone=strapi_cache:10m max_size=512m inactive=60m use_temp_path=off;
proxy_cache_path /var/cache/nginx/next  levels=1:2 keys_zone=next_cache:10m  max_size=1g   inactive=60m use_temp_path=off;

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    server_name photovideo.ae www.photovideo.ae api.photovideo.ae;
    return 301 https://$host$request_uri;
}

# ── www → apex redirect ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.photovideo.ae;
    ssl_certificate     /etc/letsencrypt/live/photovideo.ae/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/photovideo.ae/privkey.pem;
    return 301 https://photovideo.ae$request_uri;
}

# ── API (Strapi) ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.photovideo.ae;

    ssl_certificate     /etc/letsencrypt/live/photovideo.ae/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/photovideo.ae/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload size (for portfolio images/videos)
    client_max_body_size 100M;
    client_body_timeout 120s;

    # Auth rate limit
    location ~* ^/api/auth/(local|register) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API cache for public endpoints
    location ~* ^/api/(articles|portfolios|feed-posts|users) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_cache strapi_cache;
        proxy_cache_valid 200 1m;
        proxy_cache_bypass $http_authorization;
        proxy_no_cache $http_authorization;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Strapi admin & all other
    location / {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}

# ── Frontend (Next.js) ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name photovideo.ae;

    ssl_certificate     /etc/letsencrypt/live/photovideo.ae/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/photovideo.ae/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Next.js static files — aggressive cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache next_cache;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Favicon, robots, manifest
    location ~* \.(ico|txt|xml|json|webmanifest)$ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # YT Downloader tool
    location /download {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Next.js app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

