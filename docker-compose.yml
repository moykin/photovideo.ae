services:
  postgres:
    image: postgres:16-alpine
    container_name: photovideo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-photovideo}
      POSTGRES_USER: ${DB_USER:-strapi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strapi_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-strapi} -d ${DB_NAME:-photovideo}']
      interval: 10s
      timeout: 5s
      retries: 5

  strapi:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: photovideo_strapi
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DB_NAME:-photovideo}
      DATABASE_USERNAME: ${DB_USER:-strapi}
      DATABASE_PASSWORD: ${DB_PASSWORD:-strapi_secret}
    ports:
      - '1337:1337'
    volumes:
      - ./backend:/app
      - /app/node_modules
      - strapi_uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: photovideo_frontend
    restart: unless-stopped
    env_file: ./frontend/.env.local
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - strapi

  yt2gdrive:
    build:
      context: ./tools
    container_name: photovideo_yt2gdrive
    restart: unless-stopped
    env_file: ./tools/.env
    environment:
      - HTTP_PROXY=socks5://xray-client:1080
      - HTTPS_PROXY=socks5://xray-client:1080
      - ALL_PROXY=socks5://xray-client:1080
      # внутренние запросы к PO-token провайдеру НЕ гнать через прокси
      - NO_PROXY=bgutil-provider,localhost,127.0.0.1
      - no_proxy=bgutil-provider,localhost,127.0.0.1
    ports:
      - '8080:8080'
    volumes:
      - ./tools/app:/app
      - ~/.config/yt-dlp:/cookies:ro
    depends_on:
      - bgutil-provider

  # PO-token провайдер: генерит ГОСТЕВОЙ токен YouTube БЕЗ аккаунта и cookies.
  # yt-dlp (плагин bgutil) сам берёт токен по http://bgutil-provider:4416.
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider
    container_name: photovideo_bgutil
    init: true
    restart: unless-stopped
    expose:
      - '4416'

  xray-client:
    image: teddysun/xray:latest
    container_name: photovideo_xray
    restart: unless-stopped
    volumes:
      - ./infrastructure/xray/config.json:/etc/xray/config.json:ro
    ports:
      - '1080:1080'

volumes:
  postgres_data:
  strapi_uploads:
