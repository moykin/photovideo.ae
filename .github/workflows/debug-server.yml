name: Debug Server

on:
  workflow_dispatch:
    inputs:
      test_url:
        description: 'YouTube URL to test (optional)'
        required: false
        default: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check server state
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== whoami ==="
            whoami
            echo "=== cookies at /root/.config/yt-dlp/ ==="
            sudo ls -la /root/.config/yt-dlp/ 2>/dev/null || echo "NOT FOUND"
            sudo wc -l /root/.config/yt-dlp/youtube-cookies.txt 2>/dev/null || echo "FILE MISSING"
            echo "=== docker volume mounts for yt2gdrive ==="
            docker inspect photovideo_yt2gdrive 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin)[0]; [print(m['Source'],'->',m['Destination']) for m in d.get('Mounts',[])]"
            echo "=== cookies inside container ==="
            docker exec photovideo_yt2gdrive ls -la /cookies/ 2>/dev/null || echo "CONTAINER COOKIE DIR MISSING"
            echo "=== test yt-dlp inside container ==="
            TEST_URL="${{ github.event.inputs.test_url }}"
            echo "Testing: $TEST_URL"
            docker exec photovideo_yt2gdrive yt-dlp \
              --no-playlist --skip-download \
              --cookies /cookies/youtube-cookies.txt \
              "$TEST_URL" 2>&1
